name: Package

on:
  push:
    branches: [main, master]
    tags:
      - '!updater'
      - '*.*.*'
  workflow_dispatch:

jobs:
  change-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.outputstep.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install git
        run: |
          sudo apt-get update
          sudo apt-get install -y git
      - id: outputstep
        run: |
          RAW=$(git describe --tags | sed 's/-[0-9]*-.*//g')
          VERSION=${RAW#v}
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Change Version for Windows
        run: |
          VERSION=$(git describe --tags | sed 's/-[0-9]*-.*//g' | sed 's/^v//')
          sed -i "s/\"version\":.*/\"version\": \"$VERSION\",/g" package.json
          sed -i "s/\"version\":.*/\"version\": \"$VERSION\"/g" src-tauri/tauri.conf.json
          sed -i "s/version = \"0.0.0\"/version = \"$VERSION\"/g" src-tauri/Cargo.toml
      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: ./*
          if-no-files-found: error

  build-for-windows:
    needs: change-version
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
      - name: Install Dependencies
        run: pnpm install
      - name: Decode private key
        shell: pwsh
        run: |
          $base64 = "${{ secrets.TAURI_PRIVATE_KEY }}"
          $bytes = [System.Convert]::FromBase64String($base64)
          [System.IO.File]::WriteAllBytes("cheatsheet.key", $bytes)
      # 编译 nsis-tauri-utils 插件
      - name: Build nsis-tauri-utils from source
        run: |
          cd nsis-tauri-utils/crates/nsis-tauri-utils
          cargo build --release
          echo "NSIS_TAURI_UTILS_PATH=$env:GITHUB_WORKSPACE/nsis-tauri-utils/crates/nsis-tauri-utils/target/release/nsis_tauri_utils.dll" >> $env:GITHUB_ENV
      - name: Build and Package
        env:
          TAURI_PRIVATE_KEY: "cheatsheet.key"
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          NSIS_TAURI_UTILS_PATH: ${{ env.NSIS_TAURI_UTILS_PATH }}
        run: pnpm tauri build -b nsis,updater --target x86_64-pc-windows-msvc
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows_x86_64
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe*
          if-no-files-found: error
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags')
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG
          token: ${{ secrets.GITHUB_TOKEN }}
          files: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup*