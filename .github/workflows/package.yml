name: Package

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  build-windows:
    needs: get-version
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Check if private key secret exists
        id: check_secret
        shell: pwsh
        run: |
          if ("${{ secrets.TAURI_PRIVATE_KEY }}" -ne "") {
            echo "has_key=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "has_key=false" >> $env:GITHUB_OUTPUT
          }
      
      - name: Decode private key
        if: steps.check_secret.outputs.has_key == 'true'
        shell: pwsh
        run: |
          $bytes = [System.Convert]::FromBase64String("${{ secrets.TAURI_PRIVATE_KEY }}")
          [System.IO.File]::WriteAllBytes("cheatsheet.key", $bytes)
      
      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ steps.check_secret.outputs.has_key == 'true' && 'cheatsheet.key' || '' }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: pnpm tauri build -b nsis --target x86_64-pc-windows-msvc
      
      - name: Upload artifacts to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: CheatSheetNew-${{ needs.get-version.outputs.version }}-Windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.zip.sig
          if-no-files-found: error
      
      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: CheatSheetNew v${{ needs.get-version.outputs.version }}
          body: |
            ## CheatSheetNew ${{ needs.get-version.outputs.version }}
            
            ### 更新内容
            - 请在此处填写更新说明
            
            ### 安装说明
            1. 下载 `CheatSheetNew_${{ needs.get-version.outputs.version }}_x64-setup.exe`
            2. 双击运行安装
            3. 打开 Adobe Photoshop，按 `F1` 查看快捷键
            
            ### 功能
            - ✅ 支持 Adobe Photoshop 2026 快捷键
            - ✅ 默认热键 F1 / Ctrl+F1
            - ✅ 窗口比例 85%，圆角 30px
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.zip.sig
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}