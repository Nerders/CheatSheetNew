name: Package

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  build-windows:
    needs: get-version
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read
    
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc]
      fail-fast: false
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 8
      
      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.get-version.outputs.version }}
          releaseName: "CheatSheetNew v${{ needs.get-version.outputs.version }}"
          releaseBody: |
            ## CheatSheetNew ${{ needs.get-version.outputs.version }}
            
            ### 更新内容
            - 请在此处填写更新说明
            
            ### 安装说明
            1. 下载 `CheatSheetNew_${{ needs.get-version.outputs.version }}_x64-setup.exe`
            2. 双击运行安装
            3. 打开 Adobe Photoshop，按 `F1` 查看快捷键
            
            ### 功能
            - ✅ 支持 Adobe Photoshop 2026 快捷键
            - ✅ 默认热键 F1 / Ctrl+F1
            - ✅ 窗口比例 85%，圆角 30px
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
